<div class="col-xl-4 col-lg-4 col-md-6">

    <div class="category-listing mb-50">

        <div class="single-listing">

            <div class="select-Categories pb-30">
                <div class="small-tittle mb-20">
                    <h4>دسته بندی</h4>
                </div>
                {% for category in categories %}
                <label class="container">
                    {{ category.name }}
                    <input type="checkbox"
                           name="categories"
                           value="{{ category.id }}"
                           {% if category.id in selected_categories %}checked{% endif %}>
                    <span class="checkmark"></span>
                </label>
                {% empty %}
                <p class="text-muted">هیچ دسته‌بندی‌ای وجود ندارد.</p>
                {% endfor %}
            </div>

            <aside class="left_widgets p_filter_widgets price_rangs_aside sidebar_box_shadow mb-40">
                <div class="small-tittle">
                    <h4>فیلتر قیمت</h4>
                </div>
                <div class="widgets_inner">
                    <div class="filter">
                        <label class="filter__label">
                            <input type="text" class="filter__input" name="min_price"
                                   value="{{ min_price|default:0 }}">
                        </label>

                        <label class="filter__label">
                            <input type="text" class="filter__input" name="max_price"
                                   value="{{ max_price|default:150000 }}">
                        </label>

<!--                        <div id="sliderPrice" class="filter__slider-price" data-min="0"-->
<!--                             data-max="1000000" data-step="10000"></div>-->
                    </div>
                </div>
            </aside>

            <div class="select-Categories pt-100 pb-60">
                <div class="small-tittle mb-20">
                    <h4>فیلتر انتشارات</h4>
                </div>
                {% for publisher in publishers %}
                <label class="container">
                    {{ publisher.name }}
                    <input type="checkbox"
                           name="publishers"
                           value="{{ publisher.id }}"
                           {% if publisher.id in selected_publishers %}checked{% endif %}>
                    <span class="checkmark"></span>
                </label>
                {% empty %}
                <p class="text-muted">هیچ ناشری یافت نشد.</p>
                {% endfor %}
            </div>

    </div>
</div>
